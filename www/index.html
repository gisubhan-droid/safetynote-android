<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Safety NOTE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #4E3A63 0%, #D70072 100%);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column; color: white;
    }

    /* ── 스플래시 화면 ── */
    #splash {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
    }
    .logo { font-size: 4rem; }
    .title { font-size: 1.6rem; font-weight: 700; letter-spacing: 1px; }
    .sub { font-size: 0.85rem; opacity: 0.75; margin-bottom: 16px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 서버 설정 화면 ── */
    #setup {
      display: none;
      width: 100%; max-width: 400px;
      padding: 32px 24px;
      flex-direction: column; align-items: center; gap: 20px;
    }
    .setup-logo { font-size: 3rem; margin-bottom: 4px; }
    .setup-title { font-size: 1.4rem; font-weight: 700; }
    .setup-desc { font-size: 0.82rem; opacity: 0.8; text-align: center; line-height: 1.5; }

    .input-group {
      width: 100%; display: flex; flex-direction: column; gap: 8px;
    }
    .input-label {
      font-size: 0.8rem; font-weight: 600; opacity: 0.9; letter-spacing: 0.5px;
    }
    .input-wrap {
      display: flex; align-items: center; gap: 0;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 10px; overflow: hidden;
    }
    .input-wrap:focus-within {
      border-color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.2);
    }
    #serverUrl {
      flex: 1; padding: 14px 16px;
      background: transparent; border: none; outline: none;
      color: white; font-size: 0.95rem;
    }
    #serverUrl::placeholder { color: rgba(255,255,255,0.5); }

    .btn-connect {
      width: 100%; padding: 16px;
      background: white; color: #4E3A63;
      border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    .btn-connect:active { opacity: 0.85; }

    .presets {
      width: 100%; display: flex; flex-direction: column; gap: 8px;
    }
    .preset-label {
      font-size: 0.75rem; opacity: 0.7; text-align: center;
    }
    .preset-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .preset-btn {
      padding: 6px 12px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px; color: white;
      font-size: 0.75rem; cursor: pointer;
      transition: background 0.2s;
    }
    .preset-btn:active { background: rgba(255,255,255,0.3); }

    .error-msg {
      font-size: 0.8rem;
      color: #ffcdd2;
      text-align: center;
      display: none;
    }

    /* ── 연결 중 오버레이 ── */
    #connecting {
      display: none;
      flex-direction: column; align-items: center; gap: 12px;
    }
    .connecting-text { font-size: 0.9rem; opacity: 0.85; }
  </style>
</head>
<body>

  <!-- 스플래시 -->
  <div id="splash">
    <div class="logo">🛡️</div>
    <div class="title">Safety NOTE</div>
    <div class="sub">스마트 현장 안전관리 시스템</div>
    <div class="spinner"></div>
  </div>

  <!-- 서버 설정 화면 -->
  <div id="setup">
    <div class="setup-logo">🛡️</div>
    <div class="setup-title">Safety NOTE</div>
    <div class="setup-desc">
      연결할 서버 주소를 입력해주세요.<br>
      관리자에게 서버 주소를 문의하세요.
    </div>

    <div class="input-group">
      <div class="input-label">서버 주소</div>
      <div class="input-wrap">
        <input
          id="serverUrl"
          type="url"
          placeholder="https://your-server.com:3443"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
        />
      </div>
      <div class="error-msg" id="errorMsg">⚠ 올바른 주소를 입력해주세요 (https://... 형식)</div>
    </div>

    <button class="btn-connect" onclick="connectServer()">서버 연결</button>

    <div class="presets">
      <div class="preset-label">최근 사용 서버</div>
      <div class="preset-list" id="presetList"></div>
    </div>
  </div>

  <!-- 연결 중 -->
  <div id="connecting">
    <div class="spinner"></div>
    <div class="connecting-text" id="connectingText">서버에 연결 중...</div>
  </div>

  <script>
    const STORAGE_KEY   = 'sn_server_url';
    const HISTORY_KEY   = 'sn_server_history';
    const MAX_HISTORY   = 5;

    /** 저장된 서버 주소 불러오기 */
    function getSavedUrl() {
      try { return localStorage.getItem(STORAGE_KEY) || ''; } catch(e) { return ''; }
    }

    /** 서버 주소 저장 + 히스토리 업데이트 */
    function saveUrl(url) {
      try {
        localStorage.setItem(STORAGE_KEY, url);
        let history = getHistory();
        history = [url, ...history.filter(u => u !== url)].slice(0, MAX_HISTORY);
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      } catch(e) {}
    }

    /** 히스토리 목록 */
    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { return []; }
    }

    /** URL 유효성 검사 */
    function isValidUrl(url) {
      try {
        const u = new URL(url);
        return u.protocol === 'https:' || u.protocol === 'http:';
      } catch(e) { return false; }
    }

    /** 히스토리 버튼 렌더링 */
    function renderPresets() {
      const list = document.getElementById('presetList');
      const history = getHistory();
      list.innerHTML = '';
      if (history.length === 0) {
        list.innerHTML = '<span style="font-size:0.75rem;opacity:0.5">없음</span>';
        return;
      }
      history.forEach(url => {
        const btn = document.createElement('button');
        btn.className = 'preset-btn';
        // 표시는 짧게
        const display = url.replace(/^https?:\/\//, '').replace(/\/$/, '');
        btn.textContent = display;
        btn.onclick = () => {
          document.getElementById('serverUrl').value = url;
          connectServer();
        };
        list.appendChild(btn);
      });
    }

    /** 서버 연결 실행 */
    function connectServer() {
      const input = document.getElementById('serverUrl');
      const errMsg = document.getElementById('errorMsg');
      let url = input.value.trim().replace(/\/$/, ''); // 끝 슬래시 제거

      // 프로토콜 자동 보완
      if (url && !url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
        input.value = url;
      }

      if (!isValidUrl(url)) {
        errMsg.style.display = 'block';
        input.focus();
        return;
      }
      errMsg.style.display = 'none';

      // 저장 후 이동
      saveUrl(url);

      // 연결 중 화면으로 전환
      document.getElementById('setup').style.display = 'none';
      const conn = document.getElementById('connecting');
      conn.style.display = 'flex';
      document.getElementById('connectingText').textContent = url + ' 에 연결 중...';

      // WebView 이동
      setTimeout(() => {
        window.location.replace(url);
      }, 400);
    }

    /** 엔터키 처리 */
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('serverUrl').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') connectServer();
      });
    });

    /** 앱 시작 로직 */
    window.addEventListener('load', function() {
      const savedUrl = getSavedUrl();

      if (savedUrl) {
        // 저장된 주소 있음 → 1.5초 스플래시 후 자동 연결
        document.getElementById('connecting') && void 0;
        setTimeout(function() {
          document.getElementById('splash').style.display = 'none';
          const conn = document.getElementById('connecting');
          conn.style.display = 'flex';
          document.getElementById('connectingText').textContent = savedUrl + ' 에 연결 중...';

          setTimeout(function() {
            window.location.replace(savedUrl);
          }, 300);
        }, 1200);
      } else {
        // 저장된 주소 없음 → 설정 화면 표시
        setTimeout(function() {
          document.getElementById('splash').style.display = 'none';
          const setup = document.getElementById('setup');
          setup.style.display = 'flex';
          renderPresets();
          // 기본값 힌트
          document.getElementById('serverUrl').placeholder = 'https://your-nas.synology.me:3443';
        }, 1000);
      }
    });
  </script>
</body>
</html>
