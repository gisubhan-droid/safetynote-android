<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Safety NOTE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #4E3A63;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column; color: white;
    }
    .logo { font-size: 3rem; margin-bottom: 0.5rem; }
    .title { font-size: 1.5rem; font-weight: bold; margin-bottom: 0.3rem; }
    .sub { font-size: 0.85rem; opacity: 0.7; margin-bottom: 2rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">🛡️</div>
  <div class="title">Safety NOTE</div>
  <div class="sub">스마트 현장 안전관리 시스템</div>
  <div class="spinner"></div>
  <script>
    // Capacitor 로드 후 NAS 서버로 이동
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        window.location.replace('https://linkmax.myds.me:3443');
      }, 500);
    });
  </script>
</body>
</html>
