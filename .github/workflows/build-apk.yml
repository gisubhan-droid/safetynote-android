name: Safety NOTE APK Build and Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK version (e.g. 1.1.0)'
        required: false
        default: '1.1.0'
      release_note:
        description: 'Release note'
        required: false
        default: 'Safety NOTE update'
      force_update:
        description: 'Force update (true/false)'
        required: false
        default: 'false'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

