name: Safety NOTE APK Build and Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK version (e.g. 1.1.0)'
        required: false
        default: '1.3.0'
      release_note:
        description: 'Release note'
        required: false
        default: '4단계 로그인 개선(아이디 저장/비번토글/로딩), 5단계 앱 설정(테마/알림/글자크기), 2단계 GPS 위치 추적(작업일지 위치 자동기록/이력조회)'
      force_update:
        description: 'Force update (true/false)'
        required: false
        default: 'false'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm packages
        run: npm ci

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Apply custom MainActivity and icons
        run: |
          DEST="android/app/src/main/java/me/linkmax/safetynote"
          mkdir -p "$DEST"
          cp android-overrides/app/src/main/java/me/linkmax/safetynote/MainActivity.java "$DEST/MainActivity.java"
          echo "MainActivity copied"

          # MyFirebaseMessagingService.java 복사 (Phase 2 — FEAT-025-FCM)
          if [ -f "android-overrides/app/src/main/java/me/linkmax/safetynote/MyFirebaseMessagingService.java" ]; then
            cp android-overrides/app/src/main/java/me/linkmax/safetynote/MyFirebaseMessagingService.java "$DEST/MyFirebaseMessagingService.java"
            echo "MyFirebaseMessagingService.java copied"
          fi

          # google-services.json 복사 (FCM 필수)
          if [ -f "android-overrides/app/google-services.json" ]; then
            cp android-overrides/app/google-services.json android/app/google-services.json
            echo "google-services.json copied"
          fi

          # AndroidManifest.xml 교체 (권한: GPS, 카메라, 알림, 지도앱 queries + FCM 서비스)
          MANIFEST_SRC="android-overrides/app/src/main/AndroidManifest.xml"
          MANIFEST_DEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_SRC" ]; then
            cp "$MANIFEST_SRC" "$MANIFEST_DEST"
            echo "AndroidManifest.xml replaced"
          else
            echo "AndroidManifest.xml override not found, using default"
          fi

          # PNG 아이콘 복사 (5가지 해상도)
          for density in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            SRC="android-overrides/app/src/main/res/$density"
            DEST_RES="android/app/src/main/res/$density"
            if [ -d "$SRC" ]; then
              mkdir -p "$DEST_RES"
              cp "$SRC"/*.png "$DEST_RES/"
              echo "Icon copied: $density"
            fi
          done

          # Adaptive Icon XML 삭제 (mipmap-anydpi-v26)
          # Capacitor가 생성하는 ic_launcher.xml이 PNG보다 우선 적용되어 아이콘이 바뀌지 않는 문제 해결
          ANYDPI_DIR="android/app/src/main/res/mipmap-anydpi-v26"
          if [ -d "$ANYDPI_DIR" ]; then
            rm -f "$ANYDPI_DIR/ic_launcher.xml"
            rm -f "$ANYDPI_DIR/ic_launcher_round.xml"
            echo "Adaptive icon XML removed: $ANYDPI_DIR"
          else
            echo "mipmap-anydpi-v26 not found, skipping"
          fi

      # ── FCM SDK를 Gradle 파일에 주입 (Phase 2 — FEAT-025-FCM) ───────────────
      # npx cap add android 가 build.gradle을 새로 생성하므로
      # 저장소에 미리 넣는 방식은 불가 → sed 로 생성 직후 수정
      - name: Add FCM SDK to Gradle files
        run: |
          APP_GRADLE="android/app/build.gradle"
          PROJ_GRADLE="android/build.gradle"

          echo "=== [1/2] 앱 레벨 build.gradle 수정 ==="
          if grep -q "firebase-messaging" "$APP_GRADLE"; then
            echo "FCM SDK already present — skipping"
          else
            # apply plugin 블록 끝(com.android.application 줄) 바로 다음에 google-services 플러그인 추가
            sed -i "/apply plugin: 'com.android.application'/a apply plugin: 'com.google.gms.google-services'" "$APP_GRADLE"

            # dependencies { 블록 첫 줄 바로 다음에 FCM SDK 추가
            sed -i "/^dependencies {/a\\    implementation 'com.google.firebase:firebase-messaging:23.4.0'" "$APP_GRADLE"

            echo "✅ FCM SDK + google-services plugin 추가 완료"
          fi

          echo "=== [2/2] 프로젝트 레벨 build.gradle 수정 ==="
          if grep -q "google-services" "$PROJ_GRADLE"; then
            echo "google-services classpath already present — skipping"
          else
            # classpath 'com.android.tools.build:gradle:...' 줄 바로 다음에 google-services classpath 추가
            sed -i "/classpath 'com.android.tools.build:gradle/a\\        classpath 'com.google.gms:google-services:4.4.1'" "$PROJ_GRADLE"

            echo "✅ google-services classpath 추가 완료"
          fi

          echo ""
          echo "--- app/build.gradle (상위 30줄) ---"
          head -30 "$APP_GRADLE"
          echo ""
          echo "--- android/build.gradle ---"
          cat "$PROJ_GRADLE"

      - name: Set version info
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          FORCE="${{ github.event.inputs.force_update }}"
          [ -z "$VERSION" ] && VERSION="1.1.0"
          [ -z "$FORCE" ] && FORCE="false"

          APK_NAME="safetynote-v${VERSION}.apk"
          VER_CODE=$(echo "$VERSION" | awk -F. '{printf "%d%02d%02d", $1, $2, $3}')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "ver_code=$VER_CODE" >> $GITHUB_OUTPUT
          echo "force=$FORCE" >> $GITHUB_OUTPUT

          NOTE="${{ github.event.inputs.release_note }}"
          [ -z "$NOTE" ] && NOTE="Safety NOTE update"
          NOTE_SAFE=$(echo "$NOTE" | tr '\n' ' ' | tr -s ' ' | cut -c1-200)
          echo "note=$NOTE_SAFE" >> $GITHUB_OUTPUT

          echo "Version: $VERSION / versionCode: $VER_CODE / APK: $APK_NAME"

      - name: Restore keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 not set - will use debug build"
            echo "use_debug=true" >> $GITHUB_OUTPUT
          else
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/safetynote-release.keystore
            echo "Keystore restored"
            echo "use_debug=false" >> $GITHUB_OUTPUT
          fi

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew

          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.ver_code }}/" app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ steps.version.outputs.version }}\"/" app/build.gradle

          if [ "${{ steps.keystore.outputs.use_debug }}" = "true" ]; then
            echo "Building debug APK (no keystore)"
            ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"
            echo "BUILD_TYPE=debug" >> $GITHUB_ENV
          else
            echo "Building release APK (signed)"
            ./gradlew assembleRelease --no-daemon \
              -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m" \
              -Pandroid.injected.signing.store.file="$(pwd)/app/safetynote-release.keystore" \
              -Pandroid.injected.signing.store.password="${KEYSTORE_PASSWORD}" \
              -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
              -Pandroid.injected.signing.key.password="${KEY_PASSWORD}"
            echo "BUILD_TYPE=release" >> $GITHUB_ENV
          fi

      - name: Rename APK
        run: |
          if [ "$BUILD_TYPE" = "release" ]; then
            APK_SRC="android/app/build/outputs/apk/release/app-release.apk"
            [ ! -f "$APK_SRC" ] && APK_SRC="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          else
            APK_SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          fi

          APK_DIR=$(dirname "$APK_SRC")
          APK_DST="${APK_DIR}/${{ steps.version.outputs.apk_name }}"
          cp "$APK_SRC" "$APK_DST"
          echo "APK ready: $APK_DST"
          echo "APK_DST=$APK_DST" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafetyNOTE-APK-v${{ steps.version.outputs.version }}
          path: ${{ env.APK_DST }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Safety NOTE v${{ steps.version.outputs.version }}
          body: ${{ steps.version.outputs.note }}
          files: ${{ env.APK_DST }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Notify NAS server (auto deploy)
        if: success()
        env:
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          NAS_WEBHOOK_URL: ${{ secrets.NAS_WEBHOOK_URL }}
        run: |
          WEBHOOK_URL="${NAS_WEBHOOK_URL:-https://linkmax.myds.me:3443/api/dist/apk/webhook}"
          VERSION="${{ steps.version.outputs.version }}"
          APK_FILE="${{ steps.version.outputs.apk_name }}"
          NOTE="${{ steps.version.outputs.note }}"
          FORCE="${{ steps.version.outputs.force }}"
          APK_DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${APK_FILE}"

          echo "Webhook 호출: ${WEBHOOK_URL}"
          echo "APK URL: ${APK_DOWNLOAD_URL}"

          # --insecure: Synology 자체서명 인증서 허용
          # || true: curl 연결 실패해도 워크플로우 계속 진행
          RESPONSE=$(curl -sk --insecure -w "\n%{http_code}" -X POST "${WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"secret\":\"${DEPLOY_WEBHOOK_SECRET}\",\"version\":\"${VERSION}\",\"apk_url\":\"${APK_DOWNLOAD_URL}\",\"release_note\":\"${NOTE}\",\"force_update\":\"${FORCE}\"}" \
            --connect-timeout 30 --max-time 300 \
            --retry 2 --retry-delay 5) || RESPONSE="\n000"

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "응답 코드: ${HTTP_CODE}"
          echo "응답 내용: ${BODY}"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ NAS 자동 배포 완료! v${VERSION} APK가 서버에 저장되었습니다."
          else
            echo "⚠️ NAS Webhook 응답 오류 (${HTTP_CODE}) — 빌드는 성공, NAS 수동 확인 필요"
            echo "   APK URL: ${APK_DOWNLOAD_URL}"
          fi

      - name: Build summary
        run: |
          SIZE=$(du -h "${APK_DST}" | cut -f1)
          echo "========================================"
          echo "  Safety NOTE APK Build Complete"
          echo "  Version:     v${{ steps.version.outputs.version }}"
          echo "  VersionCode: ${{ steps.version.outputs.ver_code }}"
          echo "  Build type:  $BUILD_TYPE"
          echo "  Size:        $SIZE"
          echo "========================================"
